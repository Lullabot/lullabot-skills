name: Notify prompt_library

# On every push to main, fire a repository_dispatch at
# Lullabot/prompt_library so it bumps its _skills-vendor submodule
# and rebuilds the site with the new content.
#
# Requires a PERSONAL_ACCESS_TOKEN secret authorized to call
# repository_dispatch on Lullabot/prompt_library. Prefer a
# fine-grained PAT scoped only to that repo with the minimal
# permissions needed (Contents: read, Metadata: read), or a
# GitHub App token. Avoid classic PATs with full `repo` scope.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions: {}

jobs:
  dispatch:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger prompt_library bump
        env:
          GH_TOKEN: ${{ secrets.PERSONAL_ACCESS_TOKEN }}
          SHARED_SECRET: ${{ secrets.SKILLS_DISPATCH_SECRET }}
          SHA: ${{ github.sha }}
        run: |
          if [ -z "$SHARED_SECRET" ]; then
            echo "::error::SKILLS_DISPATCH_SECRET is not configured."
            exit 1
          fi
          gh api repos/Lullabot/prompt_library/dispatches \
            -f event_type=skills-updated \
            -f "client_payload[secret]=${SHARED_SECRET}" \
            -f "client_payload[source_sha]=${SHA}" \
            -f "client_payload[source_repo]=${GITHUB_REPOSITORY}"
